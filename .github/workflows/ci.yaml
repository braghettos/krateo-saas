name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: |
          for chart in krateo-tenant krateo-tenant-portal krateo-tenant-composition-page krateo-saas-installer; do
            echo "Linting $chart..."
            helm lint charts/$chart
          done

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install krateoctl
        run: go install github.com/krateoplatformops/krateoctl@latest

      - name: Verify schemas are up to date
        run: |
          for chart in krateo-tenant krateo-tenant-portal krateo-tenant-composition-page; do
            echo "Checking schema for $chart..."
            cp charts/$chart/values.schema.json /tmp/original.json
            krateoctl gen-schema charts/$chart/values.yaml
            diff /tmp/original.json charts/$chart/values.schema.json || \
              (echo "Schema out of date for $chart. Run 'krateoctl gen-schema charts/$chart/values.yaml'" && exit 1)
          done
