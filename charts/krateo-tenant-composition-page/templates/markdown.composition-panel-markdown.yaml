kind: Markdown
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: {{ .Values.global.compositionKind | lower }}-{{ .Values.global.compositionName }}-composition-panel-markdown
  namespace: {{ .Values.global.compositionNamespace }}
spec:
  widgetData:
    markdown: |
      ## Krateo Tenant: {{ .Values.global.compositionName }}

      **Status:** Composition _{{ .Values.global.compositionGroup }}/{{ .Values.global.compositionInstalledVersion }}_

      ### Access your Krateo instance

      Once the vCluster is ready, your Krateo portal will be available at:

      - **Portal:** `https://{{ .Values.global.compositionName }}.app.krateo.io`
      - **Auth:** `https://{{ .Values.global.compositionName }}.authn.krateo.io`
      - **API:** `https://{{ .Values.global.compositionName }}.snowplow.krateo.io`

      > Note: URLs depend on your parent cluster's ingress and DNS configuration.
