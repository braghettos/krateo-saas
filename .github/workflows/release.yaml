name: Release Charts

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io/braghettos/krateo-saas

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package and push charts
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          for chart in krateo-tenant krateo-tenant-portal krateo-tenant-composition-page krateo-saas-installer; do
            echo "Processing $chart..."
            # Update chart version
            sed -i "s/CHART_VERSION/$VERSION/g" charts/$chart/Chart.yaml
            sed -i "s/APP_VERSION/$VERSION/g" charts/$chart/Chart.yaml
            # Package
            helm package charts/$chart -d dist/
            # Push as OCI artifact
            helm push dist/$chart-$VERSION.tgz oci://${{ env.REGISTRY }}
          done
