name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint (charts without OCI deps)
        run: |
          for chart in krateo-tenant-portal krateo-tenant-composition-page krateo-saas-installer; do
            echo "Linting $chart..."
            helm lint charts/$chart
          done

      - name: Helm lint krateo-tenant
        run: |
          helm dependency update charts/krateo-tenant 2>/dev/null || true
          helm lint charts/krateo-tenant || echo "::warning::krateo-tenant lint warning (OCI dependency may not be published yet)"

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install krateoctl
        run: go install github.com/krateoplatformops/krateoctl@latest

      - name: Verify schemas are up to date
        run: |
          # Charts with simple schemas (no subchart overrides needed)
          for chart in krateo-tenant-portal krateo-tenant-composition-page; do
            echo "Checking schema for $chart..."
            cp charts/$chart/values.schema.json /tmp/original-$chart.json
            krateoctl gen-schema charts/$chart/values.yaml
            if ! diff -q /tmp/original-$chart.json charts/$chart/values.schema.json > /dev/null 2>&1; then
              echo "::error::Schema out of date for $chart. Run 'krateoctl gen-schema charts/$chart/values.yaml'"
              diff /tmp/original-$chart.json charts/$chart/values.schema.json || true
              exit 1
            fi
          done

      - name: Verify krateo-tenant schema
        run: |
          # krateo-tenant needs post-processing (vcluster subchart needs additionalProperties: true)
          cp charts/krateo-tenant/values.schema.json /tmp/original-krateo-tenant.json
          krateoctl gen-schema charts/krateo-tenant/values.yaml
          python3 -c "
          import json
          with open('charts/krateo-tenant/values.schema.json', 'r') as f:
              schema = json.load(f)
          schema['additionalProperties'] = True
          schema['properties']['vcluster'] = {
              'additionalProperties': True,
              'description': 'vCluster subchart configuration',
              'title': 'vcluster',
              'type': 'object'
          }
          if 'global' in schema.get('properties', {}):
              schema['properties']['global']['additionalProperties'] = True
          if 'vcluster' in schema.get('required', []):
              schema['required'].remove('vcluster')
          with open('charts/krateo-tenant/values.schema.json', 'w') as f:
              json.dump(schema, f, indent=2)
              f.write('\n')
          "
          if ! diff -q /tmp/original-krateo-tenant.json charts/krateo-tenant/values.schema.json > /dev/null 2>&1; then
            echo "::error::Schema out of date for krateo-tenant. Run 'make gen-schema'"
            diff /tmp/original-krateo-tenant.json charts/krateo-tenant/values.schema.json || true
            exit 1
          fi
