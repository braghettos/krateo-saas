name: Release Charts

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io/braghettos/krateo-saas

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update chart versions
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          for chart in krateo-tenant-composition-page krateo-tenant-portal krateo-tenant krateo-saas-installer; do
            sed -i "s/^version: .*/version: $VERSION/" charts/$chart/Chart.yaml
            sed -i "s/^appVersion: .*/appVersion: $VERSION/" charts/$chart/Chart.yaml
          done

      - name: Update internal dependency versions
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # krateo-tenant depends on krateo-tenant-composition-page
          yq -i '(.dependencies[] | select(.name == "krateo-tenant-composition-page")).version = "'$VERSION'"' charts/krateo-tenant/Chart.yaml

      - name: Build and push charts (order matters for dependencies)
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          # 1. krateo-tenant-composition-page (no deps)
          echo "=== Publishing krateo-tenant-composition-page ==="
          helm package charts/krateo-tenant-composition-page -d dist/
          helm push dist/krateo-tenant-composition-page-$VERSION.tgz oci://${{ env.REGISTRY }}

          # 2. krateo-tenant-portal (no deps)
          echo "=== Publishing krateo-tenant-portal ==="
          helm package charts/krateo-tenant-portal -d dist/
          helm push dist/krateo-tenant-portal-$VERSION.tgz oci://${{ env.REGISTRY }}

          # 3. krateo-tenant (depends on vcluster + krateo-tenant-composition-page)
          echo "=== Publishing krateo-tenant ==="
          helm dependency update charts/krateo-tenant
          helm package charts/krateo-tenant -d dist/
          helm push dist/krateo-tenant-$VERSION.tgz oci://${{ env.REGISTRY }}

          # 4. krateo-saas-installer (no chart deps, references others via values)
          echo "=== Publishing krateo-saas-installer ==="
          helm package charts/krateo-saas-installer -d dist/
          helm push dist/krateo-saas-installer-$VERSION.tgz oci://${{ env.REGISTRY }}
